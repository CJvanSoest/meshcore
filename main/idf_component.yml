dependencies:
  idf: ">=5.5.1"
  badgeteam/badge-bsp: "^0.9.9"
  nicolaielectronics/tanmatsu-wifi: "^1.1.2"
  robotman2412/pax-gfx: "^2.1.0"
  nicolaielectronics/tanmatsu-lora:
    git: http://192.168.2.25:3000/CJ/tanmatsu-lora.git
    version: main
    # Gitea fork of upstream v0.2.1 + one commit: rx_boost (RX-sensitivity
    # toggle). Everything else — RSSI/SNR, GET_RSSI_INST (now float dBm) — is
    # upstream. Pairs with the tanmatsu-radio Gitea fork, which carries two
    # firmware fixes still pending upstream (see issue #18): the esp-hosted
    # custom-handler limit (3->8 so LoRa registers) and an inverted RX-forward
    # check. Drop this fork for nicolaielectronics/tanmatsu-lora once rx_boost
    # lands upstream. (GET_FW_VERSION was dropped; re-add via the upstream
    #  system protocol's get-information command when wired up.)
