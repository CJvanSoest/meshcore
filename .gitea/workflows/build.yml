name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  host-tests:
    name: Host tests (crypto)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check architecture include rules
        run: tests/lint/check-arch-rules.sh

      - name: Check structure rules
        run: tests/lint/check-structure.sh

      - name: Check test wiring
        run: tests/lint/check-test-wiring.sh

      - name: Install build + analysis tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential libmbedtls-dev cppcheck

      - name: Static analysis (cppcheck, first-party)
        run: tests/lint/check-cppcheck.sh

      - name: Build + run RFC 8032 Ed25519 self-test
        working-directory: tests
        run: |
          make test

  build-tanmatsu:
    name: Build (tanmatsu)
    runs-on: ubuntu-latest
    needs: host-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Build inside the ESP-IDF image via docker rather than a job `container:`,
      # so actions/checkout runs on the runner and we use the real published tag
      # `v5.5.1` (the `-node` variant does not exist).
      - name: Build firmware
        run: |
          # Use --volumes-from "$(hostname)" instead of -v "$PWD":/project: with
          # act_runner's default bind_workdir:false the workspace is a Docker volume,
          # so a host-path bind mount resolves to an empty dir on the outer daemon.
          # Reusing the job container's volumes mounts the real checkout at
          # $GITHUB_WORKSPACE inside the nested ESP-IDF container.
          docker run --rm --volumes-from "$(hostname)" -w "$GITHUB_WORKSPACE" espressif/idf:v5.5.1 \
            bash -lc '. /opt/esp/idf/export.sh && idf.py \
              -B build/tanmatsu build \
              -DDEVICE=tanmatsu \
              -DSDKCONFIG_DEFAULTS="sdkconfigs/general;sdkconfigs/tanmatsu" \
              -DSDKCONFIG=sdkconfig_tanmatsu \
              -DIDF_TARGET=esp32p4 \
              -DFAT=0'

      - name: Upload application.bin
        uses: actions/upload-artifact@v5
        with:
          name: meshcore-tanmatsu-${{ github.sha }}
          path: build/tanmatsu/application.bin
          if-no-files-found: error
