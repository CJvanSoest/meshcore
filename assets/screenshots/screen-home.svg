<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_HOME — tile-grid landing screen. Landscape 800×480 at half-scale.
     v3.0.0: 4 columns × 3 rows = 12 tiles. Tiles 74×58, footer shrunk to
     fit the third row. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#0E141B" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#16161E" stroke-width="1" rx="4"/>

  <!-- Top status strip -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="10" font-weight="500">CJvS</text>
  <text x="290" y="15" fill="#9ECE6A" font-size="9">RX:42</text>
  <text x="325" y="15" fill="#C0C8D0" font-size="9">TX:0.4%</text>
  <text x="364" y="15" fill="#9ECE6A" font-size="9">87%+</text>

  <!-- 4×3 tile grid. Tiles 74×58. Cols x=14,102,190,278 (centres 51,139,227,315).
       Rows y=26,90,154. -->

  <!-- ===== Row 1 (y=26) ===== -->
  <!-- Tile 0: Nodes (focused, amber) -->
  <rect x="14" y="26" width="74" height="58" fill="#FAA61A"/>
  <rect x="16" y="28" width="70" height="2" fill="#0E141B"/>
  <rect x="16" y="82" width="70" height="2" fill="#0E141B"/>
  <rect x="16" y="28" width="2" height="54" fill="#0E141B"/>
  <rect x="86" y="28" width="2" height="54" fill="#0E141B"/>
  <line x1="45" y1="44" x2="57" y2="44" stroke="#16161E" stroke-width="1.5"/>
  <line x1="45" y1="44" x2="51" y2="55" stroke="#16161E" stroke-width="1.5"/>
  <line x1="57" y1="44" x2="51" y2="55" stroke="#16161E" stroke-width="1.5"/>
  <circle cx="45" cy="44" r="2.5" fill="#16161E"/>
  <circle cx="57" cy="44" r="2.5" fill="#16161E"/>
  <circle cx="51" cy="55" r="2.5" fill="#16161E"/>
  <text x="51" y="72" text-anchor="middle" fill="#16161E" font-size="10" font-weight="500">Nodes</text>

  <!-- Tile 1: DM (with unread badge) -->
  <rect x="102" y="26" width="74" height="58" fill="#16161E"/>
  <rect x="124" y="40" width="30" height="15" fill="#C0C8D0" rx="2"/>
  <polygon points="129,55 137,55 132,60" fill="#C0C8D0"/>
  <text x="139" y="72" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">DM</text>
  <rect x="159" y="29" width="15" height="12" fill="#F7768E" rx="2"/>
  <text x="166.5" y="38" text-anchor="middle" fill="#0E141B" font-size="8" font-weight="600">3</text>

  <!-- Tile 2: Channel -->
  <rect x="190" y="26" width="74" height="58" fill="#16161E"/>
  <text x="227" y="56" text-anchor="middle" fill="#C0C8D0" font-size="24">#</text>
  <text x="227" y="72" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Channel</text>

  <!-- Tile 3: Map (now a shipped feature — active colour, no "soon") -->
  <rect x="278" y="26" width="74" height="58" fill="#16161E"/>
  <circle cx="315" cy="48" r="11" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <line x1="304" y1="48" x2="326" y2="48" stroke="#C0C8D0" stroke-width="1.5"/>
  <line x1="315" y1="37" x2="315" y2="59" stroke="#C0C8D0" stroke-width="1.5"/>
  <circle cx="315" cy="48" r="4.5" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <text x="315" y="72" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Map</text>

  <!-- ===== Row 2 (y=90) ===== -->
  <!-- Tile 4: Advert -->
  <rect x="14" y="90" width="74" height="58" fill="#16161E"/>
  <g fill="#C0C8D0">
    <rect x="41" y="97" width="4" height="4"/><rect x="50" y="97" width="4" height="4"/><rect x="59" y="97" width="4" height="4"/>
    <rect x="45" y="106" width="4" height="4"/><rect x="54" y="106" width="4" height="4"/>
    <rect x="41" y="115" width="4" height="4"/><rect x="50" y="115" width="4" height="4"/><rect x="59" y="115" width="4" height="4"/>
  </g>
  <text x="51" y="136" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Advert</text>

  <!-- Tile 5: WiFi (3 concentric arcs over a dot) -->
  <rect x="102" y="90" width="74" height="58" fill="#16161E"/>
  <g fill="none" stroke="#C0C8D0" stroke-width="1.5">
    <path d="M 134.8 116.8 A 6 6 0 0 1 143.2 116.8"/>
    <path d="M 131.9 114.1 A 10 10 0 0 1 146.1 114.1"/>
    <path d="M 129.1 111.1 A 14 14 0 0 1 148.9 111.1"/>
  </g>
  <circle cx="139" cy="121" r="2" fill="#C0C8D0"/>
  <text x="139" y="136" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">WiFi</text>

  <!-- Tile 6: Bluetooth (classic rune, single stroke) -->
  <rect x="190" y="90" width="74" height="58" fill="#16161E"/>
  <path d="M 220 107 L 234 119 L 227 125 L 227 101 L 234 107 L 220 119"
        fill="none" stroke="#C0C8D0" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="227" y="136" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Bluetooth</text>

  <!-- Tile 7: Toolbox (box body + handle + latch) -->
  <rect x="278" y="90" width="74" height="58" fill="#16161E"/>
  <rect x="303" y="110" width="24" height="13" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <path d="M 310 110 L 310 105 L 320 105 L 320 110" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <rect x="312" y="113" width="6" height="4" fill="#C0C8D0"/>
  <text x="315" y="136" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Toolbox</text>

  <!-- ===== Row 3 (y=154) ===== -->
  <!-- Tile 8: Settings (gear) -->
  <rect x="14" y="154" width="74" height="58" fill="#16161E"/>
  <circle cx="51" cy="176" r="7" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <circle cx="51" cy="176" r="3" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <g fill="#C0C8D0">
    <circle cx="51" cy="166" r="1.3"/><circle cx="61" cy="176" r="1.3"/>
    <circle cx="51" cy="186" r="1.3"/><circle cx="41" cy="176" r="1.3"/>
  </g>
  <text x="51" y="200" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Settings</text>

  <!-- Tile 9: About (circled italic i) -->
  <rect x="102" y="154" width="74" height="58" fill="#16161E"/>
  <circle cx="139" cy="176" r="11" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <text x="139" y="182" text-anchor="middle" fill="#C0C8D0" font-size="13" font-style="italic" font-weight="500">i</text>
  <text x="139" y="200" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">About</text>

  <!-- Tile 10: QR -->
  <rect x="190" y="154" width="74" height="58" fill="#16161E"/>
  <g fill="#C0C8D0">
    <rect x="216" y="165" width="4" height="4"/><rect x="225" y="165" width="4" height="4"/><rect x="234" y="165" width="4" height="4"/>
    <rect x="220" y="174" width="4" height="4"/><rect x="229" y="174" width="4" height="4"/>
    <rect x="216" y="183" width="4" height="4"/><rect x="225" y="183" width="4" height="4"/><rect x="234" y="183" width="4" height="4"/>
  </g>
  <text x="227" y="200" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">QR</text>

  <!-- Tile 11: Exit (door frame + arrow leaving) -->
  <rect x="278" y="154" width="74" height="58" fill="#16161E"/>
  <path d="M 316 167 L 306 167 L 306 185 L 316 185" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <line x1="310" y1="176" x2="324" y2="176" stroke="#C0C8D0" stroke-width="1.5"/>
  <polyline points="320,172 324,176 320,180" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <text x="315" y="200" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Exit</text>

  <!-- Footer (shrunk to ~28px so three rows fit) -->
  <rect x="0" y="212" width="400" height="28" fill="#16161E"/>
  <rect x="0" y="212" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="224" fill="#565F89" font-size="8">WSAD: nav   Enter: open   Tab: classic views   ESC: launcher</text>
  <text x="6" y="235" fill="#565F89" font-size="8">tanmatsu.local  ·  HTTPS /ping ready</text>
  <text x="394" y="224" text-anchor="end" fill="#565F89" font-size="8">RX:-92  SNR:+4  N:-110</text>
  <text x="394" y="235" text-anchor="end" fill="#565F89" font-size="8">3 unread DMs  ·  1 channel msg</text>
</svg>
