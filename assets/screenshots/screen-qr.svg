<?xml version="1.0" encoding="UTF-8"?>
<!-- QR overlay (drawn on top of VIEW_NODES or VIEW_HOME).
     Landscape 800×480 at half-scale. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#0E141B" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#16161E" stroke-width="1" rx="4"/>

  <!-- Dim background overlay (the QR overlay is drawn on top of whatever
       view was active when Q was pressed) -->
  <rect x="0" y="0" width="400" height="240" fill="#0E141B" opacity="0.95"/>

  <!-- Header strip -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#FAA61A" font-size="11" font-weight="600">QR contact card</text>

  <!-- QR code on left half — schematic block grid (not a real QR) -->
  <g fill="#C0C8D0">
    <!-- Finder pattern top-left -->
    <rect x="40" y="40" width="42" height="42" fill="#C0C8D0"/>
    <rect x="46" y="46" width="30" height="30" fill="#0E141B"/>
    <rect x="52" y="52" width="18" height="18" fill="#C0C8D0"/>
    <!-- Finder pattern top-right -->
    <rect x="150" y="40" width="42" height="42" fill="#C0C8D0"/>
    <rect x="156" y="46" width="30" height="30" fill="#0E141B"/>
    <rect x="162" y="52" width="18" height="18" fill="#C0C8D0"/>
    <!-- Finder pattern bottom-left -->
    <rect x="40" y="150" width="42" height="42" fill="#C0C8D0"/>
    <rect x="46" y="156" width="30" height="30" fill="#0E141B"/>
    <rect x="52" y="162" width="18" height="18" fill="#C0C8D0"/>

    <!-- Data area — random blocks to suggest content -->
    <rect x="90"  y="46"  width="6" height="6"/>
    <rect x="100" y="46"  width="6" height="6"/>
    <rect x="116" y="46"  width="6" height="6"/>
    <rect x="130" y="46"  width="6" height="6"/>
    <rect x="90"  y="58"  width="6" height="6"/>
    <rect x="108" y="58"  width="6" height="6"/>
    <rect x="116" y="58"  width="6" height="6"/>
    <rect x="124" y="58"  width="6" height="6"/>
    <rect x="138" y="58"  width="6" height="6"/>
    <rect x="100" y="70"  width="6" height="6"/>
    <rect x="116" y="70"  width="6" height="6"/>
    <rect x="124" y="70"  width="6" height="6"/>
    <rect x="138" y="70"  width="6" height="6"/>
    <rect x="40"  y="100" width="6" height="6"/>
    <rect x="56"  y="100" width="6" height="6"/>
    <rect x="70"  y="100" width="6" height="6"/>
    <rect x="86"  y="100" width="6" height="6"/>
    <rect x="100" y="100" width="6" height="6"/>
    <rect x="116" y="100" width="6" height="6"/>
    <rect x="130" y="100" width="6" height="6"/>
    <rect x="144" y="100" width="6" height="6"/>
    <rect x="158" y="100" width="6" height="6"/>
    <rect x="172" y="100" width="6" height="6"/>
    <rect x="186" y="100" width="6" height="6"/>
    <rect x="46"  y="112" width="6" height="6"/>
    <rect x="62"  y="112" width="6" height="6"/>
    <rect x="78"  y="112" width="6" height="6"/>
    <rect x="92"  y="112" width="6" height="6"/>
    <rect x="106" y="112" width="6" height="6"/>
    <rect x="120" y="112" width="6" height="6"/>
    <rect x="134" y="112" width="6" height="6"/>
    <rect x="148" y="112" width="6" height="6"/>
    <rect x="162" y="112" width="6" height="6"/>
    <rect x="178" y="112" width="6" height="6"/>
    <rect x="50"  y="124" width="6" height="6"/>
    <rect x="64"  y="124" width="6" height="6"/>
    <rect x="80"  y="124" width="6" height="6"/>
    <rect x="100" y="124" width="6" height="6"/>
    <rect x="114" y="124" width="6" height="6"/>
    <rect x="128" y="124" width="6" height="6"/>
    <rect x="142" y="124" width="6" height="6"/>
    <rect x="156" y="124" width="6" height="6"/>
    <rect x="170" y="124" width="6" height="6"/>
    <rect x="184" y="124" width="6" height="6"/>
    <rect x="100" y="160" width="6" height="6"/>
    <rect x="116" y="160" width="6" height="6"/>
    <rect x="124" y="160" width="6" height="6"/>
    <rect x="138" y="160" width="6" height="6"/>
    <rect x="100" y="172" width="6" height="6"/>
    <rect x="108" y="172" width="6" height="6"/>
    <rect x="124" y="172" width="6" height="6"/>
    <rect x="138" y="172" width="6" height="6"/>
    <rect x="100" y="184" width="6" height="6"/>
    <rect x="116" y="184" width="6" height="6"/>
    <rect x="124" y="184" width="6" height="6"/>
  </g>

  <!-- Caption on right half: identity summary -->
  <g font-family="Saira, 'Helvetica Neue', sans-serif">
    <text x="220" y="60"  fill="#FAA61A" font-size="12" font-weight="600">CJvS</text>
    <text x="220" y="78"  fill="#565F89" font-size="9">Role: chat</text>
    <text x="220" y="94"  fill="#565F89" font-size="9">Region: NL-NH</text>

    <text x="220" y="120" fill="#C0C8D0" font-size="9">Pubkey (hex):</text>
    <text x="220" y="134" fill="#C0C8D0" font-size="8" font-family="monospace">a3f1c2d4e5f6a7b8</text>
    <text x="220" y="146" fill="#C0C8D0" font-size="8" font-family="monospace">c1d2e3f4a5b6c7d8</text>
    <text x="220" y="170" fill="#565F89" font-size="8">Scan with MeshCore iOS/Android</text>
    <text x="220" y="180" fill="#565F89" font-size="8">to add as contact.</text>
  </g>

  <!-- Footer with explicit close hints in amber -->
  <rect x="0" y="218" width="400" height="22" fill="#16161E"/>
  <rect x="0" y="218" width="400" height="1" fill="#FAA61A"/>
  <text x="200" y="232" text-anchor="middle" fill="#FAA61A" font-size="9" font-weight="500">[ESC]  [X]  [Enter]   to close</text>
</svg>
