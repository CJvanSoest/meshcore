<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_CHAT (dm_inbox_mode) — landscape 800×480 at half-scale.
     Mirrors render_chat.c inbox layout:
       per row: colored square avatar with first-letter initial,
                name in white, red unread-count badge if any unread,
                subtitle: "<role>  ·  active DM" or "<role>  ·  saved contact"
       active DM (pinned on top) has an AMBER avatar; others are BLUE.
       Cursor row gets a PANEL bg + ACCENT (blue) left-stripe.
     Tokyo Night palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Tab bar -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#FAA61A" font-size="11" font-weight="600">DM</text>
  <text x="36" y="15" fill="#F7768E" font-size="9">3</text>
  <text x="290" y="15" fill="#9ECE6A" font-size="9">RX:42</text>
  <text x="325" y="15" fill="#C0C8D0" font-size="9">TX:0.4%</text>
  <text x="364" y="15" fill="#9ECE6A" font-size="9">87%+</text>

  <!-- Rows: 28 SVG-px tall (= real 56 px). Avatar = 18x18 square.
       Row 0 (focused + active DM, amber avatar) -->
  <rect x="0" y="26" width="400" height="28" fill="#24283B"/>
  <rect x="0" y="26" width="3" height="28" fill="#7AA2F7"/>
  <rect x="9" y="31" width="18" height="18" fill="#E0AF68"/>
  <text x="18" y="44" text-anchor="middle" fill="#16161E" font-size="12" font-weight="700">E</text>
  <text x="34" y="38" fill="#C0CAF5" font-size="10">EvB-pager</text>
  <rect x="100" y="32" width="16" height="11" fill="#F7768E"/>
  <text x="108" y="40" text-anchor="middle" fill="#16161E" font-size="7" font-weight="700">2</text>
  <text x="34" y="49" fill="#565F89" font-size="7">chat  ·  active DM</text>

  <!-- Row 1: saved contact, BLUE avatar -->
  <rect x="9" y="59" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="72" text-anchor="middle" fill="#16161E" font-size="12" font-weight="700">R</text>
  <text x="34" y="66" fill="#C0CAF5" font-size="10">Renze</text>
  <text x="34" y="77" fill="#565F89" font-size="7">chat  ·  saved contact</text>

  <!-- Row 2: saved contact with unread -->
  <rect x="9" y="87" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="100" text-anchor="middle" fill="#16161E" font-size="12" font-weight="700">A</text>
  <text x="34" y="94" fill="#C0CAF5" font-size="10">AnonNode-D9</text>
  <rect x="106" y="88" width="13" height="11" fill="#F7768E"/>
  <text x="112" y="96" text-anchor="middle" fill="#16161E" font-size="7" font-weight="700">1</text>
  <text x="34" y="105" fill="#565F89" font-size="7">chat  ·  saved contact</text>

  <!-- Row 3: room server -->
  <rect x="9" y="115" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="128" text-anchor="middle" fill="#16161E" font-size="12" font-weight="700">T</text>
  <text x="34" y="122" fill="#C0CAF5" font-size="10">THE-AMSTROOMSERVER</text>
  <text x="34" y="133" fill="#565F89" font-size="7">room server  ·  saved contact</text>

  <!-- Row 4: another saved contact -->
  <rect x="9" y="143" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="156" text-anchor="middle" fill="#16161E" font-size="12" font-weight="700">S</text>
  <text x="34" y="150" fill="#C0CAF5" font-size="10">SX1262-Test</text>
  <text x="34" y="161" fill="#565F89" font-size="7">sensor  ·  saved contact</text>

  <!-- Row separator lines mimicking pax_simple_rect dividers -->
  <line x1="12" y1="55"  x2="388" y2="55"  stroke="#24283B" stroke-width="0.5"/>
  <line x1="12" y1="83"  x2="388" y2="83"  stroke="#24283B" stroke-width="0.5"/>
  <line x1="12" y1="111" x2="388" y2="111" stroke="#24283B" stroke-width="0.5"/>
  <line x1="12" y1="139" x2="388" y2="139" stroke="#24283B" stroke-width="0.5"/>
  <line x1="12" y1="167" x2="388" y2="167" stroke="#24283B" stroke-width="0.5"/>

  <!-- Footer -->
  <rect x="0" y="212" width="400" height="28" fill="#16161E"/>
  <rect x="0" y="212" width="400" height="1" fill="#24283B"/>
  <text x="10" y="226" fill="#565F89" font-size="8">W/S: row   Enter: open   T: type   D: delete   ESC: home   Tab: next</text>
  <text x="394" y="226" text-anchor="end" fill="#565F89" font-size="8">5 conversations  ·  ★ amber = active DM</text>
</svg>
