<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_CHAT (open DM thread) — landscape 800×480 at half-scale.
     Same render_msg_list layout as channel:
       own  → right-aligned BLUE on PANEL bg, meta GREEN (ack'd) / GRAY (pending)
       peer → left-aligned WHITE, meta GRAY with time + Nh
     Tokyo Night palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Tab bar -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#FAA61A" font-size="11" font-weight="600">DM</text>
  <text x="38" y="15" fill="#C0CAF5" font-size="11">— EvB-pager</text>
  <text x="290" y="15" fill="#9ECE6A" font-size="9">RX:42</text>
  <text x="325" y="15" fill="#C0C8D0" font-size="9">TX:0.4%</text>
  <text x="364" y="15" fill="#9ECE6A" font-size="9">87%+</text>

  <!-- Peer 1 -->
  <text x="14" y="40" fill="#C0CAF5" font-size="10">Hoi! Ben je rond 14:00 thuis?</text>
  <text x="14" y="50" fill="#565F89" font-size="7">13:42 - 2h</text>

  <!-- Own 1 (ack'd → GREEN meta) -->
  <rect x="200" y="58" width="190" height="14" fill="#24283B"/>
  <text x="386" y="69" text-anchor="end" fill="#7AA2F7" font-size="10">Ja, kom maar langs</text>
  <text x="386" y="81" text-anchor="end" fill="#9ECE6A" font-size="7">13:43 - ack</text>

  <!-- Peer 2 -->
  <text x="14" y="93" fill="#C0CAF5" font-size="10">Top, kom om 14:00 langs</text>
  <text x="14" y="103" fill="#565F89" font-size="7">13:44 - 2h</text>

  <!-- Peer 3 -->
  <text x="14" y="117" fill="#C0CAF5" font-size="10">Heb je het cert van Nicolai al?</text>
  <text x="14" y="127" fill="#565F89" font-size="7">13:44 - 2h</text>

  <!-- Own 2 (ack'd) -->
  <rect x="220" y="135" width="170" height="14" fill="#24283B"/>
  <text x="386" y="146" text-anchor="end" fill="#7AA2F7" font-size="10">ja, install gedaan</text>
  <text x="386" y="158" text-anchor="end" fill="#9ECE6A" font-size="7">13:44 - ack</text>

  <!-- Own 3 (pending → GRAY meta) -->
  <rect x="260" y="166" width="130" height="14" fill="#24283B"/>
  <text x="386" y="177" text-anchor="end" fill="#7AA2F7" font-size="10">Tot zo!</text>
  <text x="386" y="189" text-anchor="end" fill="#565F89" font-size="7">13:45 - ...</text>

  <!-- Input row, typing (ACCENT/blue line) -->
  <rect x="0" y="194" width="400" height="20" fill="#24283B"/>
  <rect x="0" y="194" width="400" height="1.5" fill="#7AA2F7"/>
  <text x="10" y="208" fill="#C0CAF5" font-size="9">&gt; Onderweg|</text>
  <text x="390" y="208" text-anchor="end" fill="#565F89" font-size="8">8/256</text>

  <!-- Footer with two-line hint -->
  <rect x="0" y="214" width="400" height="26" fill="#16161E"/>
  <rect x="0" y="214" width="400" height="1" fill="#24283B"/>
  <text x="10" y="225" fill="#565F89" font-size="8">Enter: send   ESC: cancel   Backspace: delete   ⬤: emoji</text>
  <text x="10" y="236" fill="#565F89" font-size="8">ESC (not typing): inbox   D: delete conversation   Tab: next view</text>
</svg>
