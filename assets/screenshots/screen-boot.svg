<?xml version="1.0" encoding="UTF-8"?>
<!-- Boot splash + diagnostic log. Title + "Community app" attribution at the
     top, then DIAG lines stream in below (one per init step, colour-coded:
     gray=starting, green=ok, yellow=warning, red=fail). Landscape 800×480
     at half-scale. Tokyo Night palette (COL_BG=#1A1B26, COL_WHITE=#C0CAF5,
     COL_GRAY=#565F89, COL_GREEN=#9ECE6A, COL_YELLOW=#E0AF68, COL_RED=#F7768E,
     COL_AMBER=COL_YELLOW). -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Splash header: large amber title + small amber attribution -->
  <text x="14" y="22" fill="#FAA61A" font-size="14" font-weight="700">MeshCore v2.4.0</text>
  <text x="14" y="36" fill="#FAA61A" font-size="8">Community app by CJ van Soest</text>

  <!-- DIAG log starts y=49 in our scaled units (real diag_y=74 / 2 = 37; using
       49 here to leave a bit more visual breathing room than the real screen). -->
  <g font-family="monospace" font-size="8">
    <text x="14" y="51" fill="#565F89">wifi_connection_init_stack...</text>
    <text x="14" y="63" fill="#9ECE6A">  wifi init: SUCCESS (0)</text>

    <text x="14" y="75" fill="#565F89">bsp_rtc_update_time...</text>
    <text x="14" y="87" fill="#9ECE6A">  RTC: synced from coprocessor</text>

    <text x="14" y="99" fill="#565F89">SD mount...</text>
    <text x="14" y="111" fill="#9ECE6A">  SD: ready (FAT32, 32 GB)</text>

    <text x="14" y="123" fill="#565F89">lora_init_remote(16)...</text>
    <text x="14" y="135" fill="#9ECE6A">  lora_init_remote: SUCCESS (0)</text>

    <text x="14" y="147" fill="#9ECE6A">NVS: 869.618MHz SF7 BW62</text>

    <text x="14" y="159" fill="#565F89">sys_proto get_information...</text>
    <text x="14" y="171" fill="#9ECE6A">  fw: tanmatsu-radio v3.2.0 (live)</text>

    <text x="14" y="183" fill="#565F89">HTTPS cert (from NVS)...</text>
    <text x="14" y="195" fill="#9ECE6A">  cert: FP a3f1c2d4...b6c7d8</text>

    <text x="14" y="207" fill="#FAA61A">  mDNS: tanmatsu.local (publishing)</text>
  </g>

  <!-- Bottom band, no real footer — just a thin meta line -->
  <text x="394" y="232" text-anchor="end" fill="#565F89" font-size="7">build 2026-06-10  ·  esp32p4 / esp32c6</text>
</svg>
