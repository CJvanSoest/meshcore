name: Privacy Gate

# Defence-in-depth check for the public mirror. Greps the tree for
# patterns and asserts that forbidden files are absent. The actual
# pattern set lives in the repository secret PRIVACY_PATTERNS, and
# the forbidden-file list lives in PRIVACY_FORBIDDEN_FILES (one path
# per line) — keeping the patterns themselves off the public mirror.
#
# If a secret is missing the job fails closed: a misconfigured gate
# is worse than a noisy one, since silent passes look like clean runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan for private patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tracked-source pattern scan
        env:
          PATTERNS: ${{ secrets.PRIVACY_PATTERNS }}
        run: |
          if [ -z "$PATTERNS" ]; then
            echo "::error::PRIVACY_PATTERNS secret not configured. See repo settings -> Secrets and variables -> Actions."
            exit 1
          fi
          if git grep -nIE "$PATTERNS"; then
            echo "::error::Private patterns matched above. Either redact the value or keep the file off the public mirror."
            exit 1
          fi
          echo "Pattern scan clean."

      - name: Forbidden files present
        env:
          FORBIDDEN: ${{ secrets.PRIVACY_FORBIDDEN_FILES }}
        run: |
          if [ -z "$FORBIDDEN" ]; then
            echo "::error::PRIVACY_FORBIDDEN_FILES secret not configured."
            exit 1
          fi
          fail=0
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              echo "::error::Forbidden file present on public mirror: $path"
              fail=1
            fi
          done <<< "$FORBIDDEN"
          [ "$fail" -eq 0 ] || exit 1
          echo "Forbidden-file check clean."
