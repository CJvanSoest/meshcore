name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  host-tests:
    name: Host tests + static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check architecture include rules
        run: tests/lint/check-arch-rules.sh

      - name: Check structure rules
        run: tests/lint/check-structure.sh

      - name: Check test wiring
        run: tests/lint/check-test-wiring.sh

      - name: Install build + analysis tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libmbedtls-dev cppcheck

      - name: Static analysis (cppcheck, first-party)
        run: tests/lint/check-cppcheck.sh

      - name: Build + run host tests
        working-directory: tests
        run: make test

  build-tanmatsu:
    name: Build (tanmatsu)
    runs-on: ubuntu-latest
    needs: host-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Build inside the ESP-IDF image via docker rather than a job `container:`,
      # so actions/checkout runs on the runner (which has Node) and we use the
      # real published tag `v5.5.1` (the `-node` variant does not exist).
      - name: Build firmware
        run: |
          docker run --rm -v "$PWD":/project -w /project espressif/idf:v5.5.1 \
            bash -lc '. /opt/esp/idf/export.sh && idf.py \
              -B build/tanmatsu build \
              -DDEVICE=tanmatsu \
              -DSDKCONFIG_DEFAULTS="sdkconfigs/general;sdkconfigs/tanmatsu" \
              -DSDKCONFIG=sdkconfig_tanmatsu \
              -DIDF_TARGET=esp32p4 \
              -DFAT=0'

      - name: Upload application.bin
        uses: actions/upload-artifact@v5
        with:
          name: meshcore-tanmatsu-${{ github.sha }}
          path: build/tanmatsu/application.bin
          if-no-files-found: error
