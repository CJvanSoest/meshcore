  <circle cx="139" cy="138" r="5" fill="#C0C8D0"/>
  <g stroke="#C0C8D0" stroke-width="1.5">
    <line x1="139" y1="128" x2="139" y2="124"/>
    <line x1="139" y1="152" x2="139" y2="148"/>
    <line x1="129" y1="138" x2="125" y2="138"/>
    <line x1="149" y1="138" x2="153" y2="138"/>
  </g>
