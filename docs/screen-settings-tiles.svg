<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_SETTINGS (category-list mode) — landscape 800×480 at half-scale.
     Same compact 4×2 tile grid pattern as VIEW_HOME. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#0E141B" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#16161E" stroke-width="1" rx="4"/>

  <!-- Tab bar -->
