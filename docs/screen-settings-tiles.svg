  <rect x="16" y="98" width="70" height="2" fill="#0E141B"/>
  <rect x="16" y="32" width="2" height="68" fill="#0E141B"/>
  <rect x="86" y="32" width="2" height="68" fill="#0E141B"/>
  <circle cx="51" cy="55" r="4" fill="none" stroke="#16161E" stroke-width="1.5"/>
  <circle cx="51" cy="68" r="8" fill="none" stroke="#16161E" stroke-width="1.5"/>
  <text x="51" y="90" text-anchor="middle" fill="#16161E" font-size="10" font-weight="500">Identity</text>

  <!-- Regulatory -->
  <rect x="102" y="30" width="74" height="72" fill="#16161E"/>
  <polygon points="139,46 151,53 151,68 139,75 127,68 127,53" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <text x="139" y="90" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Regulatory</text>

  <!-- Radio -->
  <rect x="190" y="30" width="74" height="72" fill="#16161E"/>
  <circle cx="227" cy="60" r="2.5" fill="#C0C8D0"/>
  <circle cx="227" cy="60" r="7" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <circle cx="227" cy="60" r="12" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <text x="227" y="90" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Radio</text>

  <!-- Network -->
  <rect x="278" y="30" width="74" height="72" fill="#16161E"/>
  <circle cx="315" cy="50" r="1.8" fill="#C0C8D0"/>
  <circle cx="306" cy="70" r="1.8" fill="#C0C8D0"/>
  <circle cx="324" cy="70" r="1.8" fill="#C0C8D0"/>
  <line x1="315" y1="50" x2="306" y2="70" stroke="#C0C8D0" stroke-width="0.9"/>
  <line x1="315" y1="50" x2="324" y2="70" stroke="#C0C8D0" stroke-width="0.9"/>
  <line x1="306" y1="70" x2="324" y2="70" stroke="#C0C8D0" stroke-width="0.9"/>
  <text x="315" y="90" text-anchor="middle" fill="#C0C8D0" font-size="10" font-weight="500">Network</text>

  <!-- Row 2 (y=110, h=72) -->
  <!-- Region & Location -->
  <rect x="14" y="110" width="74" height="72" fill="#16161E"/>
  <circle cx="51" cy="132" r="7" fill="none" stroke="#C0C8D0" stroke-width="1.5"/>
  <line x1="46" y1="137" x2="51" y2="150" stroke="#C0C8D0" stroke-width="1.5"/>
  <line x1="56" y1="137" x2="51" y2="150" stroke="#C0C8D0" stroke-width="1.5"/>
  <circle cx="51" cy="132" r="2.5" fill="#C0C8D0"/>
