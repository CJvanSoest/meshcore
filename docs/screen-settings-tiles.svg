<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_SETTINGS (category-list mode) — 4-col Pager-style tile grid.
     Settings is a two-level menu: this top level shows category tiles;
     drilling in (Enter) reveals the fields for that category. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager-style header (shared across classic views) -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="11" font-weight="500">Settings</text>
  <text x="295" y="15" fill="#9ECE6A" font-size="10">RX:42</text>
  <text x="332" y="15" fill="#C0C8D0" font-size="10">TX:0.4%</text>
  <text x="370" y="15" fill="#9ECE6A" font-size="10">87%+</text>

  <!-- 4 cols x 2 rows (6 categories so the last row has 4 + 2 empty slots).
       tile_w = (400 - 30*5)/4 = 62.5  (we round to 63 below for crisp pixels)
       tile_h = (640 - 22 - 10 - 10 - 19)/2 = 289 -->

  <!-- Row 1 -->
  <!-- Identity -->
  <rect x="15" y="32" width="81" height="288" fill="#16161E"/>
  <circle cx="55" cy="135" r="10" fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <circle cx="55" cy="160" r="20" fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <text x="55" y="246" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Identity</text>

  <!-- Regulatory -->
  <rect x="111" y="32" width="81" height="288" fill="#16161E"/>
  <polygon points="151,114 168,128 168,148 151,162 134,148 134,128"
           fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <text x="151" y="246" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Regulatory</text>

  <!-- Radio -->
  <rect x="207" y="32" width="81" height="288" fill="#16161E"/>
  <circle cx="247" cy="138" r="4" fill="#C0C8D0"/>
  <circle cx="247" cy="138" r="12" fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <circle cx="247" cy="138" r="22" fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <text x="247" y="246" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Radio</text>

  <!-- Network -->
  <rect x="303" y="32" width="81" height="288" fill="#16161E"/>
  <circle cx="343" cy="120" r="3" fill="#C0C8D0"/>
  <circle cx="328" cy="155" r="3" fill="#C0C8D0"/>
  <circle cx="358" cy="155" r="3" fill="#C0C8D0"/>
  <line x1="343" y1="120" x2="328" y2="155" stroke="#C0C8D0" stroke-width="2"/>
  <line x1="343" y1="120" x2="358" y2="155" stroke="#C0C8D0" stroke-width="2"/>
  <line x1="328" y1="155" x2="358" y2="155" stroke="#C0C8D0" stroke-width="2"/>
  <text x="343" y="246" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Network</text>

  <!-- Row 2 -->
  <!-- Region & Location (multi-line label) -->
  <rect x="15" y="330" width="81" height="288" fill="#16161E"/>
  <circle cx="55" cy="425" r="12" fill="none" stroke="#C0C8D0" stroke-width="2"/>
  <circle cx="55" cy="425" r="4" fill="#C0C8D0"/>
  <line x1="47" y1="436" x2="55" y2="455" stroke="#C0C8D0" stroke-width="2"/>
  <line x1="63" y1="436" x2="55" y2="455" stroke="#C0C8D0" stroke-width="2"/>
  <text x="55" y="538" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Region &amp;</text>
  <text x="55" y="552" text-anchor="middle" fill="#C0C8D0" font-size="11" font-weight="500">Location</text>

  <!-- Brightness (focused — orange) -->
  <rect x="111" y="330" width="81" height="288" fill="#FAA61A"/>
  <rect x="113" y="332" width="77" height="2" fill="#0E141B"/>
  <rect x="113" y="614" width="77" height="2" fill="#0E141B"/>
  <rect x="113" y="332" width="2" height="284" fill="#0E141B"/>
  <rect x="190" y="332" width="2" height="284" fill="#0E141B"/>
  <circle cx="151" cy="438" r="8" fill="#16161E"/>
  <g stroke="#16161E" stroke-width="2">
    <line x1="151" y1="420" x2="151" y2="412"/>
    <line x1="151" y1="456" x2="151" y2="464"/>
    <line x1="133" y1="438" x2="125" y2="438"/>
    <line x1="169" y1="438" x2="177" y2="438"/>
    <line x1="138" y1="425" x2="132" y2="419"/>
    <line x1="164" y1="425" x2="170" y2="419"/>
    <line x1="138" y1="451" x2="132" y2="457"/>
    <line x1="164" y1="451" x2="170" y2="457"/>
  </g>
  <text x="151" y="544" text-anchor="middle" fill="#16161E" font-size="11" font-weight="500">Brightness</text>

  <!-- Footer -->
  <rect x="0" y="621" width="400" height="19" fill="#16161E"/>
  <rect x="0" y="621" width="400" height="1" fill="#FAA61A"/>
  <text x="5" y="634" fill="#565F89" font-size="8">WSAD: nav   Enter: open   ESC: home   Tab: next view</text>
</svg>
