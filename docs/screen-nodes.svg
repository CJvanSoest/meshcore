<?xml version="1.0" encoding="UTF-8"?>
<!-- Nodes view — Pager-style top strip (view name + RX/TX/battery),
     then header row, then up to ~12 visible node rows with role tag,
     name, RSSI, SNR, packet count, distance, age. Contacts marked '*'. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager header -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="11" font-weight="500">Nodes</text>
  <!-- Other-tab unread badges inline (DM 3, # 1) -->
  <rect x="65" y="5" width="22" height="12" fill="#F7768E"/>
  <text x="76" y="14" text-anchor="middle" fill="#0E141B" font-size="8" font-weight="500">DM 3</text>
  <rect x="92" y="5" width="20" height="12" fill="#F7768E"/>
  <text x="102" y="14" text-anchor="middle" fill="#0E141B" font-size="8" font-weight="500"># 1</text>
  <text x="285" y="15" fill="#9ECE6A" font-size="10">RX:42</text>
  <text x="322" y="15" fill="#C0C8D0" font-size="10">TX:0.4%</text>
  <text x="362" y="15" fill="#9ECE6A" font-size="10">87%+</text>

  <!-- Column header strip -->
  <rect x="0" y="26" width="400" height="13" fill="#16161E"/>
  <text x="4"  y="36" fill="#565F89" font-size="8">Role</text>
  <text x="48" y="36" fill="#565F89" font-size="8">Name</text>
  <text x="245" y="36" fill="#565F89" font-size="8">RSSI</text>
  <text x="278" y="36" fill="#565F89" font-size="8">SNR</text>
  <text x="307" y="36" fill="#565F89" font-size="8">#Pkt</text>
  <text x="336" y="36" fill="#565F89" font-size="8">Dist</text>
  <text x="367" y="36" fill="#565F89" font-size="8">Seen</text>

  <!-- Rows (row_h = 22 here) -->
  <!-- Row 0 (focused, panel + blue accent) -->
  <rect x="0" y="40" width="400" height="22" fill="#24283B"/>
  <rect x="0" y="40" width="3" height="22" fill="#7AA2F7"/>
  <text x="4"   y="55" fill="#9ECE6A" font-size="9">CHAT</text>
  <text x="48"  y="55" fill="#C0CAF5" font-size="10">CJvS</text>
  <text x="245" y="55" fill="#9ECE6A" font-size="10">-72</text>
  <text x="278" y="55" fill="#9ECE6A" font-size="10">+5</text>
  <text x="307" y="55" fill="#565F89" font-size="10">#18</text>
  <text x="336" y="55" fill="#565F89" font-size="10">1.2km</text>
  <text x="367" y="55" fill="#565F89" font-size="10">3m</text>

  <!-- Row 1 -->
  <text x="4"   y="77" fill="#7AA2F7" font-size="9">REPT</text>
  <text x="48"  y="77" fill="#C0CAF5" font-size="10">repeater-zh</text>
  <text x="245" y="77" fill="#9ECE6A" font-size="10">-78</text>
  <text x="278" y="77" fill="#9ECE6A" font-size="10">+2</text>
  <text x="307" y="77" fill="#565F89" font-size="10">#142</text>
  <text x="336" y="77" fill="#565F89" font-size="10">8km</text>
  <text x="367" y="77" fill="#565F89" font-size="10">12s</text>

  <!-- Row 2 (contact marker) -->
  <text x="4"   y="99" fill="#9ECE6A" font-size="9">CHAT</text>
  <text x="40"  y="99" fill="#E0AF68" font-size="10">*</text>
  <text x="48"  y="99" fill="#C0CAF5" font-size="10">alice</text>
  <text x="245" y="99" fill="#E0AF68" font-size="10">-95</text>
  <text x="278" y="99" fill="#E0AF68" font-size="10">-3</text>
  <text x="307" y="99" fill="#565F89" font-size="10">#7</text>
  <text x="336" y="99" fill="#565F89" font-size="10">3.4km</text>
  <text x="367" y="99" fill="#565F89" font-size="10">1m</text>

  <!-- Row 3 -->
  <text x="4"   y="121" fill="#E0AF68" font-size="9">SENS</text>
  <text x="48"  y="121" fill="#C0CAF5" font-size="10">temp-rotterdam</text>
  <text x="245" y="121" fill="#E0AF68" font-size="10">-102</text>
  <text x="278" y="121" fill="#E0AF68" font-size="10">-7</text>
  <text x="307" y="121" fill="#565F89" font-size="10">#3</text>
  <text x="336" y="121" fill="#565F89" font-size="10">15km</text>
  <text x="367" y="121" fill="#565F89" font-size="10">8m</text>

  <!-- Annotation -->
  <text x="14" y="430" fill="#7AA2F7" font-size="10" font-style="italic">Header pulls double duty: shows the active</text>
  <text x="14" y="443" fill="#7AA2F7" font-size="10" font-style="italic">view name and inline unread badges so a</text>
  <text x="14" y="456" fill="#7AA2F7" font-size="10" font-style="italic">DM arriving while you're here is glanceable.</text>
  <text x="14" y="476" fill="#565F89" font-size="9">Q: open QR overlay  ·  A: send advert</text>
  <text x="14" y="488" fill="#565F89" font-size="9">F: fav  ·  L: cycle role filter</text>

  <!-- Footer -->
  <rect x="0" y="610" width="400" height="30" fill="#16161E"/>
  <rect x="0" y="610" width="400" height="1" fill="#FAA61A"/>
  <text x="5"  y="624" fill="#C0CAF5" font-size="10">Nodes:4  Contacts:1</text>
  <text x="5"  y="635" fill="#565F89" font-size="8">W/S nav   A:advert   F:fav   L:filter   Q:QR</text>
</svg>
