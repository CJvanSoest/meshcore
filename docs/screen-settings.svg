<?xml version="1.0" encoding="UTF-8"?>
<!-- Settings tab — Tokyo Night palette
     TAB_BAR_H=44 (real) → 22 in this half-scale SVG.
     row_h=44 → 22 here. Two-line footer (60 real → 30 here). -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- ── Tab bar (h=22) ── -->
  <rect x="0" y="0" width="400" height="22" fill="#16161E" rx="4"/>
  <rect x="0" y="11" width="400" height="11" fill="#16161E"/>
  <!-- Reserve 100px right for status indicators (200 in real coords) -->
  <!-- 4 tabs over (400-100)/4 = 75 each -->
  <!-- Active: Settings -->
  <rect x="0" y="0" width="75" height="22" fill="#7AA2F7" rx="4"/>
  <rect x="0" y="11" width="75" height="11" fill="#7AA2F7"/>
  <text x="37" y="16" fill="#16161E" font-family="'Saira',sans-serif" font-size="11" font-weight="500" text-anchor="middle">Settings</text>
  <text x="112" y="16" fill="#565F89" font-family="'Saira',sans-serif" font-size="11" text-anchor="middle">Nodes</text>
  <text x="187" y="16" fill="#565F89" font-family="'Saira',sans-serif" font-size="11" text-anchor="middle">DM</text>
  <text x="262" y="16" fill="#565F89" font-family="'Saira',sans-serif" font-size="11" text-anchor="middle">Channel</text>
  <!-- Status: RX:5 | 85% -->
  <text x="394" y="16" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">85%</text>
  <text x="370" y="16" fill="#565F89" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">|</text>
  <text x="360" y="16" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">RX:5</text>
  <rect x="0" y="21" width="400" height="1" fill="#24283B"/>

  <!-- ── Settings rows (row_h=22, y0=25) ── -->

  <!-- Row 0: Owner name -->
  <text x="9"   y="40" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Owner name</text>
  <text x="391" y="40" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">TanmatsuUser</text>
  <rect x="6" y="46" width="388" height="1" fill="#24283B"/>

  <!-- Row 1: Advert name -->
  <text x="9"   y="62" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Advert name</text>
  <text x="391" y="62" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">(use owner)</text>
  <rect x="6" y="68" width="388" height="1" fill="#24283B"/>

  <!-- Row 2: Frequency — SELECTED (panel + accent bar) -->
  <rect x="0" y="69" width="400" height="22" fill="#24283B"/>
  <rect x="0" y="69" width="3" height="22" fill="#7AA2F7"/>
  <text x="9"   y="84" fill="#C0CAF5" font-family="'Saira',sans-serif" font-size="10">Frequency</text>
  <text x="391" y="84" fill="#C0CAF5" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">869.618 MHz</text>
  <rect x="6" y="90" width="388" height="1" fill="#24283B"/>

  <!-- Row 3: Spreading factor -->
  <text x="9"   y="106" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Spreading factor</text>
  <text x="391" y="106" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">SF8</text>
  <rect x="6" y="112" width="388" height="1" fill="#24283B"/>

  <!-- Row 4: Bandwidth -->
  <text x="9"   y="128" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Bandwidth</text>
  <text x="391" y="128" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">62 kHz</text>
  <rect x="6" y="134" width="388" height="1" fill="#24283B"/>

  <!-- Row 5: Coding rate -->
  <text x="9"   y="150" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Coding rate</text>
  <text x="391" y="150" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">4/6</text>
  <rect x="6" y="156" width="388" height="1" fill="#24283B"/>

  <!-- Row 6: TX power -->
  <text x="9"   y="172" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">TX power</text>
  <text x="391" y="172" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">22 dBm</text>
  <rect x="6" y="178" width="388" height="1" fill="#24283B"/>

  <!-- Row 7: Sync word -->
  <text x="9"   y="194" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Sync word</text>
  <text x="391" y="194" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">0x2B</text>
  <rect x="6" y="200" width="388" height="1" fill="#24283B"/>

  <!-- Row 8: Preamble length -->
  <text x="9"   y="216" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Preamble length</text>
  <text x="391" y="216" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">16</text>
  <rect x="6" y="222" width="388" height="1" fill="#24283B"/>

  <!-- Row 9: Advert interval -->
  <text x="9"   y="238" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Advert interval</text>
  <text x="391" y="238" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">30min</text>
  <rect x="6" y="244" width="388" height="1" fill="#24283B"/>

  <!-- Row 10: LoRa preset -->
  <text x="9"   y="260" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">LoRa preset</text>
  <text x="391" y="260" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">MeshCore</text>
  <rect x="6" y="266" width="388" height="1" fill="#24283B"/>

  <!-- Row 11: Role -->
  <text x="9"   y="282" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Role</text>
  <text x="391" y="282" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">CHAT_NODE</text>
  <rect x="6" y="288" width="388" height="1" fill="#24283B"/>

  <!-- Row 12: Path hash size -->
  <text x="9"   y="304" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Path hash size</text>
  <text x="391" y="304" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">1 byte (64 hops)</text>
  <rect x="6" y="310" width="388" height="1" fill="#24283B"/>

  <!-- Row 13: Region scope -->
  <text x="9"   y="326" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">Region scope</text>
  <text x="391" y="326" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">NL</text>
  <rect x="6" y="332" width="388" height="1" fill="#24283B"/>

  <!-- Scroll counter (bottom-right above footer) -->
  <text x="391" y="603" fill="#565F89" font-family="'Saira',sans-serif" font-size="10" text-anchor="end">1-14/14</text>

  <!-- ── Footer (2 lines, 30 high) ── -->
  <rect x="0" y="610" width="400" height="30" fill="#16161E"/>
  <rect x="0" y="610" width="400" height="1" fill="#24283B"/>
  <!-- Line 1: controls -->
  <text x="6" y="622" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">W/S: navigate   Enter: edit   R: reload   Tab: next   U: flash</text>
  <!-- Line 2: SNTP timestamp (green = synced) -->
  <text x="6" y="635" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="10">SNTP 14:23:07  25-05-2026</text>
</svg>
