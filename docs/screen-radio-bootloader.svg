<?xml version="1.0" encoding="UTF-8"?>
<!-- Radio Bootloader screen — shown after pressing U in Settings.
     C6 has been power-cycled into USB-DFU; on-screen esptool instructions appear. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Custom top bar (no tab strip in this mode) -->
  <rect x="0" y="0" width="400" height="22" fill="#7AA2F7"/>
  <text x="14" y="16" fill="#16161E" font-family="'Saira',sans-serif" font-size="11" font-weight="500">Radio Bootloader Mode</text>

  <!-- Status line -->
  <text x="14" y="42" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="11" font-weight="500">C6 is in bootloader mode.</text>

  <!-- Instructions -->
  <text x="14" y="62" fill="#C0CAF5" font-family="'Saira',sans-serif" font-size="10">On your Mac:</text>

  <!-- esptool command block (mono font) -->
  <rect x="10" y="70" width="380" height="200" fill="#16161E" rx="3"/>
  <text x="18" y="86"  fill="#E0AF68" font-family="monospace" font-size="9">ls /dev/cu.usbmodem*</text>
  <text x="18" y="100" fill="#565F89" font-family="'Saira',sans-serif" font-size="9" font-style="italic">(find the new C6 USB device)</text>

  <text x="18" y="124" fill="#C0CAF5" font-family="monospace" font-size="9">cd tanmatsu-radio</text>

  <text x="18" y="148" fill="#E0AF68" font-family="monospace" font-size="9">esptool.py --chip esp32c6</text>
  <text x="18" y="161" fill="#E0AF68" font-family="monospace" font-size="9">  --port /dev/cu.usbmodem21401</text>
  <text x="18" y="174" fill="#E0AF68" font-family="monospace" font-size="9">  --before no_reset write_flash</text>
  <text x="18" y="187" fill="#E0AF68" font-family="monospace" font-size="9">  --flash_mode dio --flash_freq 80m</text>
  <text x="18" y="200" fill="#E0AF68" font-family="monospace" font-size="9">  --flash_size 8MB</text>
  <text x="18" y="213" fill="#E0AF68" font-family="monospace" font-size="9">  0x0    bootloader.bin</text>
  <text x="18" y="226" fill="#E0AF68" font-family="monospace" font-size="9">  0x8000 partition-table.bin</text>
  <text x="18" y="239" fill="#E0AF68" font-family="monospace" font-size="9">  0xd000 ota_data_initial.bin</text>
  <text x="18" y="252" fill="#E0AF68" font-family="monospace" font-size="9">  0x10000 tanmatsu-radio.bin</text>

  <!-- Hints below -->
  <text x="14" y="290" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">After flashing, MeshCore detects a blank C6</text>
  <text x="14" y="304" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">(frequency = 0) and re-pushes the NVS config.</text>

  <text x="14" y="332" fill="#E0AF68" font-family="'Saira',sans-serif" font-size="10" font-weight="500">⚠ Do NOT click "Update Radio" in launcher</text>
  <text x="14" y="346" fill="#565F89" font-family="'Saira',sans-serif" font-size="10">— it downgrades C6 to v2.7.3.</text>

  <!-- ── Footer (single line) ── -->
  <rect x="0" y="626" width="400" height="14" fill="#16161E"/>
  <rect x="0" y="626" width="400" height="1" fill="#24283B"/>
  <text x="12" y="637" fill="#565F89" font-family="'Saira',sans-serif" font-size="9">ESC / F1: restart badge after flashing</text>
</svg>
