<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <!-- Background -->
  <rect width="400" height="640" fill="#000000" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#444444" stroke-width="1" rx="4"/>

  <!-- ── Tab bar ── -->
  <rect x="0" y="0" width="400" height="22" fill="#222222" rx="4"/>
  <rect x="0" y="11" width="400" height="11" fill="#222222"/>
  <text x="39"  y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Settings</text>
  <text x="118" y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Nodes</text>
  <!-- Active: DM -->
  <rect x="158" y="0" width="79" height="22" fill="#0088FF" rx="4"/>
  <rect x="158" y="11" width="79" height="11" fill="#0088FF"/>
  <text x="197" y="15" fill="#000000" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">DM</text>
  <text x="276" y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Channel</text>
  <text x="394" y="15" fill="#00BB44" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">RX:12 | B:72%</text>

  <!-- ── Chat messages (row_h=32, chat_y0=22) ── -->

  <!-- Message 1: received (y=22) -->
  <text x="10" y="42" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Hey, are you at the badge talk?</text>
  <rect x="4" y="54" width="392" height="1" fill="#222222"/>

  <!-- Message 2: mine (y=54) -->
  <text x="390" y="74" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">Yes, coming now!</text>
  <text x="390" y="84" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="86" width="392" height="1" fill="#222222"/>

  <!-- Message 3: received (y=86) -->
  <text x="10" y="106" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Limited seats — hurry up :)</text>
  <rect x="4" y="118" width="392" height="1" fill="#222222"/>

  <!-- Message 4: mine (y=118) -->
  <text x="390" y="138" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">Save me a spot please!</text>
  <text x="390" y="148" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="150" width="392" height="1" fill="#222222"/>

  <!-- Message 5: received (y=150) -->
  <text x="10" y="170" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Done! See you soon</text>
  <rect x="4" y="182" width="392" height="1" fill="#222222"/>

  <!-- Message 6: mine (y=182) -->
  <text x="390" y="202" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">On my way, 2 min</text>
  <text x="390" y="212" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="214" width="392" height="1" fill="#222222"/>

  <!-- Message 7: received (y=214) — most recent -->
  <text x="10" y="234" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">We're in row 3 left side!</text>
  <rect x="4" y="246" width="392" height="1" fill="#222222"/>

  <!-- ── Input bar (typing mode, DM target set) ── -->
  <!-- Border top: yellow (DM target set) -->
  <rect x="0" y="574" width="400" height="1" fill="#FFCC00"/>
  <rect x="0" y="575" width="400" height="28" fill="#1A1A1A"/>
  <!-- Typing prompt -->
  <text x="8" y="594" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">DM Alice&gt; How many rows?_</text>
  <!-- Character counter -->
  <text x="392" y="594" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">14/120</text>

  <!-- ── Footer ── -->
  <rect x="0" y="604" width="400" height="36" fill="#222222"/>
  <text x="6" y="618" fill="#FFCC00" font-family="'Courier New',Courier,monospace" font-size="11">T: DM Alice  |  ESC: channel</text>
  <text x="6" y="632" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">Enter: send  ESC: cancel  Bksp: delete</text>
</svg>
