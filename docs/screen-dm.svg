<?xml version="1.0" encoding="UTF-8"?>
<!-- Active DM conversation view (after picking a peer in the DM inbox).
     Bottom-most message pinned to the bottom; own bubbles right-aligned
     with blue text on a panel background, peer bubbles left-aligned. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager header -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="11" font-weight="500">DM</text>
  <text x="295" y="15" fill="#9ECE6A" font-size="10">RX:42</text>
  <text x="332" y="15" fill="#C0C8D0" font-size="10">TX:0.4%</text>
  <text x="370" y="15" fill="#9ECE6A" font-size="10">87%+</text>

  <!-- Conversation header strip (panel) with peer name -->
  <rect x="0" y="28" width="400" height="14" fill="#24283B"/>
  <text x="5" y="38" fill="#C0CAF5" font-size="9">‹  alice</text>

  <!-- Peer message (left-aligned, no bubble) -->
  <text x="7" y="320" fill="#C0CAF5" font-size="10">hey, are you on for #test tonight?</text>
  <text x="7" y="332" fill="#565F89" font-size="8">19:42 - 3h</text>

  <!-- Own message (right-aligned, panel bubble, blue text) -->
  <rect x="225" y="345" width="170" height="22" fill="#24283B"/>
  <text x="389" y="358" text-anchor="end" fill="#7AA2F7" font-size="10">yes, see you on the channel</text>
  <text x="389" y="370" text-anchor="end" fill="#9ECE6A" font-size="8">19:45 - ack</text>

  <!-- Peer reply -->
  <text x="7" y="395" fill="#C0CAF5" font-size="10">👍</text>
  <text x="7" y="407" fill="#565F89" font-size="8">19:46 - 3h</text>

  <!-- Input strip (panel + amber top border, "T: type message" hint) -->
  <rect x="0" y="600" width="400" height="18" fill="#24283B"/>
  <rect x="0" y="600" width="400" height="1" fill="#E0AF68"/>
  <text x="5" y="612" fill="#E0AF68" font-size="8">T: type message</text>

  <!-- Footer hint -->
  <rect x="0" y="618" width="400" height="14" fill="#16161E"/>
  <rect x="0" y="618" width="400" height="1" fill="#24283B"/>
  <text x="5" y="628" fill="#565F89" font-size="8">T: type   W/S: scroll   ESC: back to inbox   Tab: next tab</text>
</svg>
