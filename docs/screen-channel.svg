<?xml version="1.0" encoding="UTF-8"?>
<!-- Public channel chat (GRP_TXT) — header shows the active channel name
     and the regional scope. Channel ring is reloaded from SD when you
     switch channels. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager header -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="11" font-weight="500">Channel</text>
  <text x="295" y="15" fill="#9ECE6A" font-size="10">RX:42</text>
  <text x="332" y="15" fill="#C0C8D0" font-size="10">TX:0.4%</text>
  <text x="370" y="15" fill="#9ECE6A" font-size="10">87%+</text>

  <!-- Channel sub-header (panel) with name + region -->
  <rect x="0" y="28" width="400" height="25" fill="#24283B"/>
  <text x="6" y="40" fill="#C0CAF5" font-size="10">#test</text>
  <text x="6" y="51" fill="#565F89" font-size="8">  Region: nl-zh</text>

  <!-- Message stream -->
  <text x="7" y="290" fill="#C0CAF5" font-size="10">[bob] tested SF7 path to Heltec, works</text>
  <text x="7" y="302" fill="#565F89" font-size="8">19:30 - 2h</text>

  <rect x="225" y="315" width="170" height="22" fill="#24283B"/>
  <text x="389" y="328" text-anchor="end" fill="#7AA2F7" font-size="10">nice — joining now</text>
  <text x="389" y="340" text-anchor="end" fill="#565F89" font-size="8">19:32</text>

  <text x="7" y="370" fill="#C0CAF5" font-size="10">[alice] anyone in Utrecht still up?</text>
  <text x="7" y="382" fill="#565F89" font-size="8">19:35 - 4h</text>

  <!-- Input strip (green border = channel) -->
  <rect x="0" y="600" width="400" height="18" fill="#24283B"/>
  <rect x="0" y="600" width="400" height="1" fill="#9ECE6A"/>
  <text x="5" y="612" fill="#9ECE6A" font-size="8">T: send channel message</text>

  <!-- Footer hint -->
  <rect x="0" y="618" width="400" height="14" fill="#16161E"/>
  <rect x="0" y="618" width="400" height="1" fill="#24283B"/>
  <text x="5" y="628" fill="#565F89" font-size="8">T: type   W/S: scroll   R: clear   ESC: list   Tab: next</text>
</svg>
