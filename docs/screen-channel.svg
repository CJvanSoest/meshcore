<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_CHANNEL — open channel chat. Landscape 800×480 at half-scale.
     Layout mirrors render_msg_list in render_chat.c:
       own messages → right-aligned, COL_PANEL bg rectangle, COL_BLUE text,
                       meta below in COL_GREEN (ACK'd) or COL_GRAY (pending)
       peer messages → left-aligned, COL_WHITE text, no bg,
                       meta below in COL_GRAY: time + Nh (hops)
     Tokyo Night palette (COL_BG=#1A1B26, COL_PANEL=#24283B, COL_WHITE=#C0CAF5,
     COL_GRAY=#565F89, COL_BLUE=#7AA2F7, COL_AMBER=#E0AF68). -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager-style tab bar -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#FAA61A" font-size="11" font-weight="600">Channel</text>
  <text x="290" y="15" fill="#9ECE6A" font-size="9">RX:42</text>
  <text x="325" y="15" fill="#C0C8D0" font-size="9">TX:0.4%</text>
  <text x="364" y="15" fill="#9ECE6A" font-size="9">87%+</text>

  <!-- Channel header (PANEL bg, name + region subtitle) -->
  <rect x="0" y="22" width="400" height="25" fill="#24283B"/>
  <text x="12" y="34" fill="#C0CAF5" font-size="10">#amsterdam</text>
  <text x="12" y="44" fill="#565F89" font-size="8">  Region: nl-nh</text>

  <!-- Messages area starts y=52. line_h ≈ TXT_BODY+4 = 14 SVG-px.
       Each msg: text line(s) + meta line below. -->

  <!-- Peer 1 (left-aligned, white text, gray meta with time + hops) -->
  <text x="14" y="62" fill="#C0CAF5" font-size="10">Renze: paar nieuwe nodes vanavond</text>
  <text x="14" y="72" fill="#565F89" font-size="7">13:21 - 3h</text>

  <!-- Own 1 (right-aligned, BLUE on PANEL, ack=ack so meta GREEN) -->
  <rect x="200" y="80" width="190" height="14" fill="#24283B"/>
  <text x="386" y="91" text-anchor="end" fill="#7AA2F7" font-size="10">cool, ik zie ze hier ook!</text>
  <text x="386" y="103" text-anchor="end" fill="#9ECE6A" font-size="7">13:34 - ack</text>

  <!-- Peer 2 -->
  <text x="14" y="115" fill="#C0CAF5" font-size="10">Nicolai: nieuwe radio fw v3.2.1 morgen</text>
  <text x="14" y="125" fill="#565F89" font-size="7">13:37 - 1h</text>

  <!-- Peer 3 (with emoji) -->
  <text x="14" y="139" fill="#C0CAF5" font-size="10">SX1262-Test: testing testing 🚀</text>
  <text x="14" y="149" fill="#565F89" font-size="7">13:42 - 1h</text>

  <!-- Own 2 (pending ACK → GRAY meta) -->
  <rect x="230" y="157" width="160" height="14" fill="#24283B"/>
  <text x="386" y="168" text-anchor="end" fill="#7AA2F7" font-size="10">10 nodes nu, sterk!</text>
  <text x="386" y="180" text-anchor="end" fill="#565F89" font-size="7">13:46 - ...</text>

  <!-- Input row (green accent line — not typing) -->
  <rect x="0" y="192" width="400" height="20" fill="#24283B"/>
  <rect x="0" y="192" width="400" height="1.5" fill="#9ECE6A"/>
  <text x="10" y="206" fill="#9ECE6A" font-size="8">T: send channel message</text>

  <!-- Footer -->
  <rect x="0" y="212" width="400" height="28" fill="#16161E"/>
  <rect x="0" y="212" width="400" height="1" fill="#24283B"/>
  <text x="10" y="226" fill="#565F89" font-size="8">T: type   W/S: scroll   R: clear   ESC: list   Tab: next</text>
  <text x="394" y="226" text-anchor="end" fill="#565F89" font-size="8">key=SHA256(#amsterdam)[0..15]</text>
</svg>
