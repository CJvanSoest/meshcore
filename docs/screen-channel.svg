<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <!-- Background -->
  <rect width="400" height="640" fill="#000000" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#444444" stroke-width="1" rx="4"/>

  <!-- ── Tab bar ── -->
  <rect x="0" y="0" width="400" height="22" fill="#222222" rx="4"/>
  <rect x="0" y="11" width="400" height="11" fill="#222222"/>
  <text x="39"  y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Settings</text>
  <text x="118" y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Nodes</text>
  <text x="197" y="15" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">DM</text>
  <!-- Active: Channel -->
  <rect x="237" y="0" width="79" height="22" fill="#0088FF" rx="4"/>
  <rect x="237" y="11" width="79" height="11" fill="#0088FF"/>
  <text x="276" y="15" fill="#000000" font-family="'Courier New',Courier,monospace" font-size="12" text-anchor="middle">Channel</text>
  <text x="394" y="15" fill="#00BB44" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">RX:12 | B:72%</text>

  <!-- ── Channel messages (row_h=32, channel_y0=22) ── -->

  <!-- Msg 1: received (y=22) -->
  <text x="10" y="42" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Anyone at the badge workshop?</text>
  <text x="10" y="54" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">Alice</text>
  <rect x="4" y="57" width="392" height="1" fill="#222222"/>

  <!-- Msg 2: mine (y=57) -->
  <text x="390" y="77" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">Yes! Just arrived</text>
  <text x="390" y="87" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="89" width="392" height="1" fill="#222222"/>

  <!-- Msg 3: received (y=89) -->
  <text x="10" y="109" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Soldering stations are free</text>
  <text x="10" y="119" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">MeshRelay-1</text>
  <rect x="4" y="121" width="392" height="1" fill="#222222"/>

  <!-- Msg 4: received (y=121) -->
  <text x="10" y="141" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Starting in 10 min, hurry!</text>
  <text x="10" y="151" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">Bob</text>
  <rect x="4" y="153" width="392" height="1" fill="#222222"/>

  <!-- Msg 5: mine (y=153) -->
  <text x="390" y="173" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">On my way!</text>
  <text x="390" y="183" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="185" width="392" height="1" fill="#222222"/>

  <!-- Msg 6: received (y=185) -->
  <text x="10" y="205" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Which room? Main hall or annex?</text>
  <text x="10" y="215" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">Charlie</text>
  <rect x="4" y="217" width="392" height="1" fill="#222222"/>

  <!-- Msg 7: mine (y=217) -->
  <text x="390" y="237" fill="#0088FF" font-family="'Courier New',Courier,monospace" font-size="13" text-anchor="end">Annex B, room 3</text>
  <text x="390" y="247" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10" text-anchor="end">You</text>
  <rect x="4" y="249" width="392" height="1" fill="#222222"/>

  <!-- Msg 8: received (y=249) — most recent -->
  <text x="10" y="269" fill="#ffffff" font-family="'Courier New',Courier,monospace" font-size="13">Thanks, see you there!</text>
  <text x="10" y="279" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">Alice</text>
  <rect x="4" y="281" width="392" height="1" fill="#222222"/>

  <!-- ── Input bar (idle) ── -->
  <rect x="0" y="574" width="400" height="1" fill="#222222"/>
  <rect x="0" y="575" width="400" height="28" fill="#1A1A1A"/>
  <text x="8" y="594" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="13">T: type  |  Nodes: pick DM target</text>

  <!-- ── Footer ── -->
  <rect x="0" y="604" width="400" height="36" fill="#222222"/>
  <text x="6" y="618" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="11">Public channel  (AES-128-ECB, shared key)</text>
  <text x="6" y="632" fill="#888888" font-family="'Courier New',Courier,monospace" font-size="10">T: type  W/S: scroll  Tab: next  ESC: exit</text>
</svg>
