  <!-- Caption -->
  <text x="200" y="416" fill="#565F89" font-family="'Saira',sans-serif" font-size="11" text-anchor="middle">TanmatsuUser  [press any key to close]</text>

  <!-- Annotation box -->
  <rect x="40" y="450" width="320" height="140" fill="#16161E" rx="4"/>
  <text x="50" y="470" fill="#7AA2F7" font-family="'Saira',sans-serif" font-size="10" font-weight="500">QR encodes:</text>
  <text x="50" y="484" fill="#C0CAF5" font-family="'Saira',sans-serif" font-size="9" font-family="monospace">meshcore://contact/add?</text>
  <text x="50" y="496" fill="#C0CAF5" font-family="monospace" font-size="9">  name=TanmatsuUser&amp;</text>
  <text x="50" y="508" fill="#C0CAF5" font-family="monospace" font-size="9">  public_key=&lt;ed25519 pub, hex&gt;&amp;</text>
  <text x="50" y="520" fill="#C0CAF5" font-family="monospace" font-size="9">  type=1</text>
  <text x="50" y="540" fill="#565F89" font-family="'Saira',sans-serif" font-size="9" font-style="italic">Scannable by the MeshCore iOS/Android</text>
  <text x="50" y="552" fill="#565F89" font-family="'Saira',sans-serif" font-size="9" font-style="italic">app to add this Tanmatsu as a contact.</text>
  <text x="50" y="572" fill="#9ECE6A" font-family="'Saira',sans-serif" font-size="9">name = advert_name (if set) else owner</text>
</svg>
