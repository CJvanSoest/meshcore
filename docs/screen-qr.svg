<?xml version="1.0" encoding="UTF-8"?>
<!-- QR-overlay (press Q in Nodes tab) — encodes meshcore://contact/add?... URL.
     Stylised representation of the actual QR pattern. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="200" y="170" fill="#E0AF68" font-family="'Saira',sans-serif" font-size="14" font-weight="500" text-anchor="middle">Scan to add contact</text>

  <!-- QR card (white background w/ 8px margin) -->
  <rect x="100" y="190" width="200" height="200" fill="#FFFFFF"/>

  <!-- Stylised QR pattern: 12×12 grid of 16×16 modules (with 8px margin = inset 8) -->
  <!-- Position markers (top-left, top-right, bottom-left) -->
  <!-- Top-left finder -->
  <rect x="108" y="198" width="42" height="42" fill="#000000"/>
  <rect x="114" y="204" width="30" height="30" fill="#FFFFFF"/>
  <rect x="120" y="210" width="18" height="18" fill="#000000"/>
  <!-- Top-right finder -->
  <rect x="250" y="198" width="42" height="42" fill="#000000"/>
  <rect x="256" y="204" width="30" height="30" fill="#FFFFFF"/>
  <rect x="262" y="210" width="18" height="18" fill="#000000"/>
  <!-- Bottom-left finder -->
  <rect x="108" y="340" width="42" height="42" fill="#000000"/>
  <rect x="114" y="346" width="30" height="30" fill="#FFFFFF"/>
  <rect x="120" y="352" width="18" height="18" fill="#000000"/>

  <!-- Random data modules to simulate QR payload -->
  <g fill="#000000">
