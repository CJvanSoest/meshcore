<?xml version="1.0" encoding="UTF-8"?>
<!-- QR-overlay — encodes meshcore://contact/add?name=...&public_key=...&type=1
     so a peer can scan and add this badge as a contact in one tap. Triggered
     from the QR home-tile or 'Q' in the Nodes view. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- "Scan to add contact" headline above the QR (amber, TXT_TITLE real) -->
  <text x="200" y="148" text-anchor="middle" fill="#E0AF68" font-size="14" font-weight="500">Scan to add contact</text>

  <!-- White QR background panel, stylised module pattern -->
  <rect x="80" y="170" width="240" height="240" fill="#FFFFFF"/>
  <g fill="#000000">
    <!-- Three finder patterns + a scattering of modules to suggest a real QR -->
    <rect x="92"  y="182" width="42" height="42"/>
    <rect x="100" y="190" width="26" height="26" fill="#FFFFFF"/>
    <rect x="108" y="198" width="10" height="10"/>

    <rect x="266" y="182" width="42" height="42"/>
    <rect x="274" y="190" width="26" height="26" fill="#FFFFFF"/>
    <rect x="282" y="198" width="10" height="10"/>

    <rect x="92"  y="356" width="42" height="42"/>
    <rect x="100" y="364" width="26" height="26" fill="#FFFFFF"/>
    <rect x="108" y="372" width="10" height="10"/>

    <!-- Body modules — purely indicative -->
    <rect x="148" y="190" width="6" height="6"/><rect x="160" y="190" width="6" height="6"/>
    <rect x="148" y="202" width="6" height="6"/><rect x="166" y="208" width="6" height="6"/>
    <rect x="180" y="190" width="6" height="6"/><rect x="190" y="196" width="6" height="6"/>
    <rect x="160" y="220" width="6" height="6"/><rect x="178" y="226" width="6" height="6"/>
    <rect x="200" y="232" width="6" height="6"/><rect x="216" y="226" width="6" height="6"/>
    <rect x="232" y="220" width="6" height="6"/><rect x="248" y="240" width="6" height="6"/>
    <rect x="200" y="252" width="6" height="6"/><rect x="210" y="270" width="6" height="6"/>
    <rect x="180" y="280" width="6" height="6"/><rect x="232" y="278" width="6" height="6"/>
    <rect x="160" y="300" width="6" height="6"/><rect x="200" y="308" width="6" height="6"/>
    <rect x="252" y="312" width="6" height="6"/><rect x="280" y="320" width="6" height="6"/>
    <rect x="156" y="328" width="6" height="6"/><rect x="200" y="334" width="6" height="6"/>
    <rect x="240" y="338" width="6" height="6"/><rect x="280" y="350" width="6" height="6"/>
    <rect x="180" y="356" width="6" height="6"/><rect x="216" y="362" width="6" height="6"/>
    <rect x="252" y="372" width="6" height="6"/><rect x="280" y="380" width="6" height="6"/>
    <rect x="156" y="384" width="6" height="6"/><rect x="196" y="378" width="6" height="6"/>
  </g>

  <!-- Owner / advert name caption -->
  <text x="200" y="432" text-anchor="middle" fill="#565F89" font-size="9">CJvS</text>
  <!-- Explicit close hints (amber) -->
  <text x="200" y="450" text-anchor="middle" fill="#E0AF68" font-size="9" font-weight="500">[ESC]   [X]   [Enter]   to close</text>

  <!-- Annotation -->
  <text x="14" y="500" fill="#7AA2F7" font-size="10" font-style="italic">Triggered from the QR home tile or 'Q'</text>
  <text x="14" y="513" fill="#7AA2F7" font-size="10" font-style="italic">in the Nodes view. URL embeds name + 32-</text>
  <text x="14" y="526" fill="#7AA2F7" font-size="10" font-style="italic">byte pub_key + type=1 (chat node).</text>
  <text x="14" y="546" fill="#565F89" font-size="9">From the home tile, closing returns to home;</text>
  <text x="14" y="558" fill="#565F89" font-size="9">from Nodes ('Q'), closing stays in Nodes.</text>
</svg>
