<?xml version="1.0" encoding="UTF-8"?>
<!-- DM inbox view — entered from the DM home tile or by Tab-cycling
     into VIEW_CHAT. Active DM (if any) is pinned on top with an amber
     avatar; saved contacts are listed below in blue. Per-contact red
     unread badges appear right of the name. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Pager header -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#C0C8D0" font-size="11" font-weight="500">DM</text>
  <text x="295" y="15" fill="#9ECE6A" font-size="10">RX:42</text>
  <text x="332" y="15" fill="#C0C8D0" font-size="10">TX:0.4%</text>
  <text x="370" y="15" fill="#9ECE6A" font-size="10">87%+</text>

  <!-- Row 0: active DM target (amber avatar, panel bg + accent bar = focus) -->
  <rect x="0" y="30" width="400" height="28" fill="#24283B"/>
  <rect x="0" y="30" width="3" height="28" fill="#7AA2F7"/>
  <rect x="9" y="36" width="18" height="18" fill="#E0AF68"/>
  <text x="18" y="50" text-anchor="middle" fill="#16161E" font-size="12" font-weight="500">A</text>
  <text x="33" y="43" fill="#C0CAF5" font-size="10">alice</text>
  <text x="33" y="54" fill="#565F89" font-size="8">CHAT_NODE  ·  active DM</text>
  <text x="370" y="48" text-anchor="end" fill="#E0AF68" font-size="9">Enter ›</text>

  <!-- Row 1: saved contact -->
  <rect x="9" y="64" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="78" text-anchor="middle" fill="#16161E" font-size="12" font-weight="500">B</text>
  <text x="33" y="71" fill="#C0CAF5" font-size="10">bob</text>
  <text x="33" y="82" fill="#565F89" font-size="8">REPEATER  ·  saved contact</text>
  <!-- Unread badge -->
  <rect x="58" y="64" width="18" height="12" fill="#F7768E"/>
  <text x="67" y="73" text-anchor="middle" fill="#16161E" font-size="8" font-weight="500">2</text>

  <!-- Row 2 -->
  <rect x="9" y="92" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="106" text-anchor="middle" fill="#16161E" font-size="12" font-weight="500">C</text>
  <text x="33" y="99" fill="#C0CAF5" font-size="10">charlie</text>
  <text x="33" y="110" fill="#565F89" font-size="8">CHAT_NODE  ·  saved contact</text>

  <!-- Annotation -->
  <text x="14" y="280" fill="#7AA2F7" font-size="10" font-style="italic">DM ring is reloaded from SD when you</text>
  <text x="14" y="293" fill="#7AA2F7" font-size="10" font-style="italic">switch peers; messages persist between</text>
  <text x="14" y="306" fill="#7AA2F7" font-size="10" font-style="italic">app sessions (history.c).</text>
  <text x="14" y="328" fill="#565F89" font-size="9">Per-peer unread counts mirror the header</text>
  <text x="14" y="340" fill="#565F89" font-size="9">DM badge and the home-tile pill.</text>

  <!-- Footer hint -->
  <rect x="0" y="622" width="400" height="18" fill="#16161E"/>
  <rect x="0" y="622" width="400" height="1" fill="#FAA61A"/>
  <text x="5" y="635" fill="#565F89" font-size="8">W/S: nav   Enter: open   D: delete   Tab: next</text>
</svg>
