<?xml version="1.0" encoding="UTF-8"?>
<!-- DM tab — default inbox view (dm_inbox_mode=true).
     Saved contacts + active DM target on top with avatar + role/status.
     row_h=56 (real) → 28 here. Avatar 36×36 → 18×18. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- ── Tab bar ── -->
  <rect x="0" y="0" width="400" height="22" fill="#16161E" rx="4"/>
  <rect x="0" y="11" width="400" height="11" fill="#16161E"/>
  <text x="37"  y="16" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="11" text-anchor="middle">Settings</text>
  <text x="112" y="16" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="11" text-anchor="middle">Nodes</text>
  <rect x="150" y="0" width="75" height="22" fill="#7AA2F7" rx="4"/>
  <rect x="150" y="11" width="75" height="11" fill="#7AA2F7"/>
  <text x="187" y="16" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="11" font-weight="600" text-anchor="middle">DM</text>
  <text x="262" y="16" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="11" text-anchor="middle">Channel</text>
  <text x="394" y="16" fill="#9ECE6A" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" text-anchor="end">72%</text>
  <text x="370" y="16" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" text-anchor="end">|</text>
  <text x="360" y="16" fill="#9ECE6A" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" text-anchor="end">RX:12</text>
  <rect x="0" y="21" width="400" height="1" fill="#24283B"/>

  <!-- ── Inbox (inbox_y0=25, row_h=28) ── -->

  <!-- Row 0: Active DM target (amber avatar) + cursor highlight + Enter ‹ CTA -->
  <rect x="0" y="25" width="400" height="26" fill="#24283B"/>
  <rect x="0" y="25" width="3" height="26" fill="#7AA2F7"/>
  <rect x="9"  y="30" width="18" height="18" fill="#E0AF68"/>
  <text x="18" y="44" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="13" font-weight="600" text-anchor="middle">A</text>
  <text x="33" y="36" fill="#C0CAF5" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" font-weight="500">Alice</text>
  <text x="33" y="47" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="8">CHAT_NODE  ·  active DM</text>
  <text x="391" y="42" fill="#E0AF68" font-family="'Saira','Helvetica Neue',sans-serif" font-size="9" text-anchor="end">Enter ›</text>
  <rect x="6" y="52" width="388" height="1" fill="#24283B"/>

  <!-- Row 1: Saved contact (blue avatar) -->
  <rect x="9"  y="58" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="72" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="13" font-weight="600" text-anchor="middle">B</text>
  <text x="33" y="64" fill="#C0CAF5" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" font-weight="500">Bob</text>
  <text x="33" y="75" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="8">CHAT_NODE  ·  saved contact</text>
  <rect x="6" y="80" width="388" height="1" fill="#24283B"/>

  <!-- Row 2 -->
  <rect x="9"  y="86" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="100" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="13" font-weight="600" text-anchor="middle">C</text>
  <text x="33" y="92" fill="#C0CAF5" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" font-weight="500">Charlie</text>
  <text x="33" y="103" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="8">CHAT_NODE  ·  saved contact</text>
  <rect x="6" y="108" width="388" height="1" fill="#24283B"/>

  <!-- Row 3: ROOM_SERVER avatar -->
  <rect x="9"  y="114" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="128" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="13" font-weight="600" text-anchor="middle">H</text>
  <text x="33" y="120" fill="#C0CAF5" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" font-weight="500">HQ-Lounge</text>
  <text x="33" y="131" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="8">ROOM_SERVER  ·  saved contact</text>
  <rect x="6" y="136" width="388" height="1" fill="#24283B"/>

  <!-- Row 4 -->
  <rect x="9"  y="142" width="18" height="18" fill="#7AA2F7"/>
  <text x="18" y="156" fill="#16161E" font-family="'Saira','Helvetica Neue',sans-serif" font-size="13" font-weight="600" text-anchor="middle">T</text>
  <text x="33" y="148" fill="#C0CAF5" font-family="'Saira','Helvetica Neue',sans-serif" font-size="10" font-weight="500">T-Beam-CJ</text>
  <text x="33" y="159" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="8">CHAT_NODE  ·  saved contact</text>
  <rect x="6" y="164" width="388" height="1" fill="#24283B"/>

  <!-- Scroll counter -->
  <text x="391" y="615" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="9" text-anchor="end">1/5</text>

  <!-- ── Footer (single line, 18 high in SVG = 36 real) ── -->
  <rect x="0" y="622" width="400" height="18" fill="#16161E"/>
  <rect x="0" y="622" width="400" height="1" fill="#24283B"/>
  <text x="6" y="634" fill="#565F89" font-family="'Saira','Helvetica Neue',sans-serif" font-size="9">W/S: nav   Enter: open   D: delete   Tab: next</text>
</svg>
