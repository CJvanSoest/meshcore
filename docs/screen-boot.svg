<?xml version="1.0" encoding="UTF-8"?>
<!-- Boot splash + diagnostic console. Version string is pulled live from
     esp_app_get_description()->version (git-describe), so a clean tag
     produces a clean splash with no -dirty / post-tag suffix. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="640">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="640" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="639" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="14" y="28" fill="#E0AF68" font-size="14" font-weight="500">MeshCore v2.2.0</text>

  <!-- DIAG lines -->
  <text x="14" y="50"  fill="#565F89" font-size="9">wifi_connection_init_stack...</text>
  <text x="14" y="61"  fill="#9ECE6A" font-size="9">  wifi init: OK (0)</text>
  <text x="14" y="72"  fill="#9ECE6A" font-size="9">  wifi connect: OK</text>
  <text x="14" y="83"  fill="#565F89" font-size="9">SD mount...</text>
  <text x="14" y="94"  fill="#9ECE6A" font-size="9">  SD: ok</text>
  <text x="14" y="105" fill="#565F89" font-size="9">lora_init_remote(16)...</text>
  <text x="14" y="116" fill="#9ECE6A" font-size="9">  lora_init_remote: OK (0)</text>
  <text x="14" y="127" fill="#9ECE6A" font-size="9">NVS: 869.618MHz SF7 BW62</text>
  <text x="14" y="138" fill="#565F89" font-size="9">sys_proto get_information...</text>
  <text x="14" y="149" fill="#9ECE6A" font-size="9">  fw: v3.2.0 (live)</text>
  <text x="14" y="160" fill="#565F89" font-size="9">lora_get_config from C6...</text>
  <text x="14" y="171" fill="#9ECE6A" font-size="9">  C6 OK! 869.618MHz SF7</text>
  <text x="14" y="182" fill="#565F89" font-size="9">lora_set_mode(RX)...</text>
  <text x="14" y="193" fill="#9ECE6A" font-size="9">  RX mode OK - starting tasks</text>

  <!-- Annotation -->
  <text x="14" y="240" fill="#7AA2F7" font-size="10" font-style="italic">Boot diagnostics — shown for ~3 s before</text>
  <text x="14" y="253" fill="#7AA2F7" font-size="10" font-style="italic">handing off to the home tile-grid.</text>
  <text x="14" y="275" fill="#565F89" font-size="9">Colour coding:</text>
  <text x="22" y="289" fill="#565F89" font-size="9">• gray  = step starting</text>
  <text x="22" y="301" fill="#9ECE6A" font-size="9">• green = success</text>
  <text x="22" y="313" fill="#E0AF68" font-size="9">• amber = partial / using NVS fallback</text>
  <text x="22" y="325" fill="#F7768E" font-size="9">• red   = hard failure</text>
</svg>
