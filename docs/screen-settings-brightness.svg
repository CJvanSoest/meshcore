<?xml version="1.0" encoding="UTF-8"?>
<!-- VIEW_SETTINGS (drilled into Brightness category) — landscape 800×480 at half-scale.
     No slider widgets — the real screen is plain "Label  |  N%" rows just like
     the radio drill. The brightness category has a special two-line footer:
     top line "Press ⬛ to blank / wake display" (F3 hint with yellow square
     icon), bottom line standard nav hints. Tokyo Night palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Saira', 'Helvetica Neue', sans-serif; }
    ]]></style>
  </defs>

  <rect width="400" height="240" fill="#1A1B26" rx="4"/>
  <rect x="0.5" y="0.5" width="399" height="239" fill="none" stroke="#24283B" stroke-width="1" rx="4"/>

  <!-- Tab bar -->
  <rect x="0" y="0" width="400" height="22" fill="#0E141B"/>
  <rect x="0" y="21" width="400" height="1" fill="#FAA61A"/>
  <text x="6" y="15" fill="#FAA61A" font-size="11" font-weight="600">Settings</text>
  <text x="216" y="15" fill="#FAA61A" font-size="9" font-weight="500">[EDIT]</text>
  <text x="290" y="15" fill="#9ECE6A" font-size="9">RX:42</text>
  <text x="325" y="15" fill="#C0C8D0" font-size="9">TX:0.4%</text>
  <text x="364" y="15" fill="#9ECE6A" font-size="9">87%+</text>

  <!-- Category title -->
  <text x="9" y="38" fill="#FAA61A" font-size="13" font-weight="600">Brightness</text>
  <line x1="9" y1="42" x2="391" y2="42" stroke="#FAA61A" stroke-width="0.5"/>

  <g font-size="10">
    <!-- Display backlight (focused / editing — amber highlight + PANEL bg) -->
    <rect x="6" y="48" width="388" height="17" fill="#1A1F26"/>
    <text x="12" y="60" fill="#FAA61A" font-weight="500">Display backlight</text>
    <text x="388" y="60" text-anchor="end" fill="#FAA61A" font-weight="500">50%</text>

    <text x="12" y="78"  fill="#C0CAF5">Keyboard backlight</text>
    <text x="388" y="78" text-anchor="end" fill="#9ECE6A">50%</text>

    <text x="12" y="96"  fill="#C0CAF5">RGB LED brightness</text>
    <text x="388" y="96" text-anchor="end" fill="#9ECE6A">10%</text>

    <text x="12" y="114"  fill="#C0CAF5">Auto-blank display</text>
    <text x="388" y="114" text-anchor="end" fill="#9ECE6A">5min</text>
  </g>

  <!-- Footer: two lines — top is the special F3 hint (yellow square icon
       inline, then "to blank / wake display"), bottom is the standard nav. -->
  <rect x="0" y="200" width="400" height="40" fill="#16161E"/>
  <rect x="0" y="200" width="400" height="1" fill="#24283B"/>
  <text x="10" y="213" fill="#565F89" font-size="9">Press</text>
  <rect x="42" y="206" width="9" height="9" fill="#FAA61A"/>
  <text x="54" y="213" fill="#565F89" font-size="9">to blank / wake display</text>
  <text x="10" y="227" fill="#565F89" font-size="8">W/S: navigate   Enter: edit   ESC: back   R: reload</text>
  <text x="394" y="227" text-anchor="end" fill="#565F89" font-size="8">Stops: 5 / 10 / 25 / 50 / 75 / 100 %</text>
</svg>
